name: CI

on:
  push:
  pull_request:

jobs:
  fifo-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make iverilog verilator

      - name: Check LF line endings
        run: |
          if grep -RIl --exclude-dir=.git --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.vcd' $'\r' .; then
            echo "CRLF line endings found"
            exit 1
          fi

      - name: Verilator lint
        run: make lint

      - name: Run FIFO regression
        run: make test
